name: Extension - Azure

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and publish (e.g. extension-azure-devops@1.2.3). Overrides the git ref for checkout and release logic.'
        required: false
        type: string
  push:
    branches: [main]
    tags: ['extension-azure-devops@*']
    paths:
      - 'extensions/azure/**'
      - 'packages/core/**'
      - '.github/workflows/extension-azure.yml'
  pull_request:
    branches: [main]
    paths:
      - 'extensions/azure/**'
      - 'packages/core/**'
      - '.github/workflows/extension-azure.yml'

permissions:
  contents: write # write required for ncipollo/release-action to create a release
  attestations: write # required for actions/attest
  id-token: write # required for actions/attest

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # wait for previous runs to complete on main and tags
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}

env:
  BUILD_NUMBER: ${{ github.run_number }} # not discovered by default

jobs:
  Build-And-Publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag && format('refs/tags/{0}', inputs.tag) || '' }}

      - name: Setup turborepo caching
        uses: rharkor/caching-for-turbo@v2.3.14

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Download deps
        run: pnpm install
        working-directory: '${{ github.workspace }}/extensions/azure'

      - name: Build
        run: pnpm turbo run build
        working-directory: '${{ github.workspace }}/extensions/azure'

      - name: Test
        run: pnpm turbo run test
        working-directory: '${{ github.workspace }}/extensions/azure'

      - name: Update Dev Version
        if: ${{ !inputs.tag && !startsWith(github.ref, 'refs/tags/') }}
        run: pnpm packages:version --dev
        working-directory: '${{ github.workspace }}/extensions/azure'

      - name: Create Extension
        run: >
          pnpm tfx extension create
          --manifest-globs vss-extension.json
          --output-path ${{ github.workspace }}/out
          --json5
          ${{ (!inputs.tag && !startsWith(github.ref, 'refs/tags/') && '--overrides-file overrides.dev.json') || '' }}
        working-directory: extensions/azure

      - name: Upload Artifact (extensions-azure)
        uses: actions/upload-artifact@v7
        with:
          path: ${{ github.workspace }}/out/*
          name: extensions-azure

      - name: Provenance Attestation
        if: ${{ inputs.tag || startsWith(github.ref, 'refs/tags/') }}
        uses: actions/attest@v4
        with:
          subject-path: ${{ github.workspace }}/out/*.vsix

      - name: Upload Release Artifact
        if: ${{ inputs.tag || startsWith(github.ref, 'refs/tags/') }}
        uses: ncipollo/release-action@v1
        with:
          artifacts: '${{ github.workspace }}/out/*.vsix'
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitDraftDuringUpdate: true
          omitNameDuringUpdate: true
          tag: ${{ inputs.tag || github.ref_name }}

      - name: Publish to marketplace
        if: ${{ inputs.tag || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
        run: >
          pnpm tfx extension publish
          --vsix ${{ github.workspace }}/out/*.vsix
          --auth-type pat
          --token ${{ secrets.AZURE_DEVOPS_EXTENSION_TOKEN }}
          ${{ (!inputs.tag && github.ref == 'refs/heads/main' && '--share-with tingle') || '' }}
        working-directory: extensions/azure
